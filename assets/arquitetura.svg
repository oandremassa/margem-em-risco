<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="480" viewBox="0 0 1400 480">
  <rect width="1400" height="480" fill="#F5F7FA"/>
  <text x="70" y="65" font-family="Segoe UI, Arial" font-size="30" font-weight="700" fill="#0B1F33">Arquitetura do Margem em Risco</text>
  <text x="70" y="98" font-family="Segoe UI, Arial" font-size="17" fill="#667085">Da entrada controlada à decisão por contrato</text>

  <g font-family="Segoe UI, Arial">
    <g transform="translate(70,150)">
      <rect width="180" height="150" rx="14" fill="#FFFFFF" stroke="#D8DEE8"/>
      <text x="22" y="38" font-size="18" font-weight="700" fill="#0B1F33">Entrada</text>
      <text x="22" y="74" font-size="15" fill="#344054">6 arquivos CSV</text>
      <text x="22" y="102" font-size="15" fill="#344054">premissas no Excel</text>
      <text x="22" y="130" font-size="15" fill="#344054">dados sintéticos</text>
    </g>
    <g transform="translate(290,150)">
      <rect width="180" height="150" rx="14" fill="#FFFFFF" stroke="#D8DEE8"/>
      <text x="22" y="38" font-size="18" font-weight="700" fill="#0B1F33">Raw / Staging</text>
      <text x="22" y="74" font-size="15" fill="#344054">controle de lotes</text>
      <text x="22" y="102" font-size="15" fill="#344054">parse e rejeições</text>
      <text x="22" y="130" font-size="15" fill="#344054">qualidade de dados</text>
    </g>
    <g transform="translate(510,150)">
      <rect width="180" height="150" rx="14" fill="#FFFFFF" stroke="#D8DEE8"/>
      <text x="22" y="38" font-size="18" font-weight="700" fill="#0B1F33">Data Warehouse</text>
      <text x="22" y="74" font-size="15" fill="#344054">dimensões</text>
      <text x="22" y="102" font-size="15" fill="#344054">fatos separados</text>
      <text x="22" y="130" font-size="15" fill="#344054">SCD2 de contratos</text>
    </g>
    <g transform="translate(730,150)">
      <rect width="180" height="150" rx="14" fill="#FFFFFF" stroke="#D8DEE8"/>
      <text x="22" y="38" font-size="18" font-weight="700" fill="#0B1F33">Marts</text>
      <text x="22" y="74" font-size="15" fill="#344054">margem e perdas</text>
      <text x="22" y="102" font-size="15" fill="#344054">score de risco</text>
      <text x="22" y="130" font-size="15" fill="#344054">fila de ações</text>
    </g>
    <g transform="translate(950,150)">
      <rect width="180" height="150" rx="14" fill="#FFFFFF" stroke="#D8DEE8"/>
      <text x="22" y="38" font-size="18" font-weight="700" fill="#0B1F33">Camada bi</text>
      <text x="22" y="74" font-size="15" fill="#344054">10 views de consumo</text>
      <text x="22" y="102" font-size="15" fill="#344054">rótulos em português</text>
      <text x="22" y="130" font-size="15" fill="#344054">contrato estável</text>
    </g>
    <g transform="translate(1170,150)">
      <rect width="180" height="150" rx="14" fill="#0B1F33"/>
      <text x="22" y="38" font-size="18" font-weight="700" fill="#FFFFFF">Power BI</text>
      <text x="22" y="74" font-size="15" fill="#D0DAE5">8 páginas</text>
      <text x="22" y="102" font-size="15" fill="#D0DAE5">modelo em estrela</text>
      <text x="22" y="130" font-size="15" fill="#D0DAE5">PBIP + TMDL</text>
    </g>

    <g stroke="#2F6BFF" stroke-width="4" fill="none">
      <path d="M250 225 H282"/><path d="M470 225 H502"/><path d="M690 225 H722"/>
      <path d="M910 225 H942"/><path d="M1130 225 H1162"/>
    </g>
    <g fill="#2F6BFF">
      <path d="M282 225 l-12 -7 v14 z"/><path d="M502 225 l-12 -7 v14 z"/>
      <path d="M722 225 l-12 -7 v14 z"/><path d="M942 225 l-12 -7 v14 z"/>
      <path d="M1162 225 l-12 -7 v14 z"/>
    </g>
  </g>

  <rect x="70" y="350" width="1280" height="62" rx="12" fill="#E9F0FF"/>
  <text x="94" y="388" font-family="Segoe UI, Arial" font-size="17" fill="#0B1F33">
    SQL concentra as regras oficiais. Excel expõe premissas e cenários. Power BI apresenta a decisão.
  </text>
</svg>
